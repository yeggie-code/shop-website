<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Products - Admin</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f5f5f5; color:#333; }
.container { max-width:1200px; margin:0 auto; padding:20px; }
.header { background:white; padding:20px; border-radius:8px; margin-bottom:30px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
.header h1 { color:#0a0a0a; margin-bottom:10px; }
.header p { color:#666; font-size:0.9rem; }
.back-link { display:inline-block; margin-bottom:20px; color:#FF4D94; text-decoration:none; font-weight:500; }
.back-link:hover { text-decoration:underline; }
.products-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:20px; margin-bottom:40px; }
.product-card { background:white; border-radius:8px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
.product-header { display:flex; justify-content:space-between; align-items:start; margin-bottom:15px; }
.product-name { font-size:1.1rem; font-weight:600; color:#0a0a0a; }
.product-id { font-size:0.8rem; color:#999; }
.product-image { width:100%; height:200px; background:#f0f0f0; border-radius:6px; display:flex; align-items:center; justify-content:center; margin-bottom:15px; overflow:hidden; }
.product-image img { width:100%; height:100%; object-fit:cover; }
.no-image { color:#ccc; font-size:0.9rem; }
.form-group { margin-bottom:15px; }
.form-group label { display:block; font-size:0.85rem; font-weight:600; margin-bottom:5px; color:#555; text-transform:uppercase; }
.form-group input[type="file"], .form-group input[type="number"] { width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; font-family:inherit; }
.btn-group { display:flex; gap:10px; }
.btn { padding:10px 16px; border:none; border-radius:6px; cursor:pointer; font-weight:600; font-size:0.85rem; transition:background 0.2s; }
.btn-upload { background:#FF4D94; color:white; flex:1; }
.btn-upload:hover { background:#D4006A; }
.btn-delete { background:#ef4444; color:white; flex:1; }
.btn-delete:hover { background:#dc2626; }
.btn-back { background:#6b7280; color:white; padding:12px 24px; }
.btn-back:hover { background:#4b5563; }
.message { padding:15px; border-radius:6px; margin-bottom:20px; }
.message.success { background:#d1fae5; color:#065f46; border:1px solid #a7f3d0; }
.message.error { background:#fee2e2; color:#991b1b; border:1px solid #fecaca; }
.price { color:#FF4D94; font-weight:600; font-size:1rem; }
.stock { color:#666; font-size:0.9rem; }
</style>
</head>
<body>

<div class="container">
  <a href="admin.html" class="back-link">← Back to Admin Panel</a>
  
  <div class="header">
    <h1>Manage Product Images</h1>
    <p>Upload and manage product images for your wig collection.</p>
  </div>

  <div id="message"></div>

  <div class="products-grid" id="productsGrid"></div>
</div>

<script src="store_data.js"></script>
<script>
// Check admin access
const role = localStorage.getItem('eucken_role');
if (role !== 'admin') {
  window.location.href = 'login.html';
}

function renderProductsForManagement() {
  const products = getProducts();
  const grid = document.getElementById('productsGrid');
  
  grid.innerHTML = products.map(p => `
    <div class="product-card">
      <div class="product-header">
        <div>
          <div class="product-name">${p.name}</div>
          <div class="product-id">ID: ${p.id}</div>
        </div>
      </div>
      
      <div class="product-image">
        ${p.image ? `<img src="${p.image}" alt="${p.name}">` : `<span class="no-image">No Image</span>`}
      </div>
      
      <div class="price">KSh ${p.price.toLocaleString()}</div>
      <div class="stock">Stock: ${p.stock} units</div>
      
      <div class="form-group" style="margin-top:15px;">
        <label>Upload Image</label>
        <input type="file" id="file-${p.id}" accept="image/*">
      </div>
      
      <div class="btn-group">
        <button class="btn btn-upload" onclick="uploadImage(${p.id})">Upload</button>
        ${p.image ? `<button class="btn btn-delete" onclick="removeImage(${p.id})">Remove</button>` : ''}
      </div>
    </div>
  `).join('');
}

function uploadImage(productId) {
  const fileInput = document.getElementById(`file-${productId}`);
  if (!fileInput.files[0]) {
    showMessage('Please select an image file', 'error');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    const imageData = e.target.result;
    const products = getProducts();
    const product = products.find(p => p.id === productId);
    
    if (product) {
      product.image = imageData;
      try {
        saveProducts(products);
      } catch (err) {
        console.error(err);
        showMessage('Unable to save image. Try a smaller file or refresh.', 'error');
        return;
      }
      showMessage(`Image uploaded for ${product.name}!`, 'success');
      renderProductsForManagement();
      window.localStorage.setItem('eucken_products_updated', Date.now());
    }
  };
  reader.readAsDataURL(fileInput.files[0]);
}

function removeImage(productId) {
  if (!confirm('Remove this product image?')) return;
  
  const products = getProducts();
  const product = products.find(p => p.id === productId);
  
  if (product) {
    product.image = null;
    saveProducts(products);
    showMessage(`Image removed for ${product.name}!`, 'success');
    renderProductsForManagement();
    window.localStorage.setItem('eucken_products_updated', Date.now());
  }
}

function showMessage(text, type) {
  const msgEl = document.getElementById('message');
  msgEl.className = `message ${type}`;
  msgEl.textContent = text;
  setTimeout(() => msgEl.textContent = '', 4000);
}

renderProductsForManagement();
</script>

</body>
</html>
